<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Energy Intake – Part 1</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#122033;
      --muted:#64748b;
      --line:#dbe3ee;
      --accent:#0f766e;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,#f8fafc 0%,#eef5ff 50%,#f7fafc 100%);
    }
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    .hero{padding:28px 30px}
    .hero-top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;flex-wrap:wrap}
    h1{margin:0;font-size:40px;line-height:1.05}
    .sub{margin-top:8px;color:var(--muted)}
    .lang-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .lang-tabs button,.btn{
      border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:700
    }
    .lang-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .header-row{padding:22px 24px 0 24px;font-size:24px;font-weight:700}
    .content{padding:18px 24px 24px}
    .grid-3,.grid-2{display:grid;gap:16px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:8px}
    label{font-size:14px;font-weight:700}
    input,select{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);font:inherit;background:#fff
    }
    .unit-wrap{display:flex;gap:10px}
    .unit{
      min-width:78px;padding:12px;border-radius:14px;border:1px solid var(--line);background:#f8fafc;
      display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700
    }
    .actions{display:flex;gap:12px;flex-wrap:wrap}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    @media (max-width:900px){
      .grid-3,.grid-2{grid-template-columns:1fr}
      h1{font-size:32px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <section class="card hero">
    <div class="hero-top">
      <div>
        <h1 id="appTitle"></h1>
        <div class="sub">Marco Bielen – Bielen bv</div>
      </div>
      <div class="lang-tabs">
        <button type="button" class="lang-btn active" data-lang="en">ENG</button>
        <button type="button" class="lang-btn" data-lang="nl">NL</button>
        <button type="button" class="lang-btn" data-lang="fr">FR</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="header-row" id="generalTitle"></div>
    <div class="content grid-3" id="generalFields"></div>
  </section>

  <section class="card">
    <div class="header-row" id="gridTitle"></div>
    <div class="content grid-3" id="gridFields"></div>
  </section>

  <section class="card">
    <div class="header-row" id="outagesTitle"></div>
    <div class="content grid-2" id="outagesFields"></div>
  </section>

  <section class="card">
    <div class="header-row" id="consumptionTitle"></div>
    <div class="content grid-3" id="consumptionFields"></div>
  </section>

  <section class="card">
    <div class="header-row" id="documentationTitle"></div>
    <div class="content grid-2" id="documentationFields"></div>
  </section>

  <div class="actions">
    <button class="btn primary" onclick="exportWord()" id="wordBtn"></button>
    <button class="btn" onclick="exportExcel()" id="excelBtn"></button>
  </div>
</div>

<script>
const i18n = {
  en: {
    appTitle: "Hotel Energy Intake – Part 1",
    general: "General Questions",
    grid: "Grid Connection",
    outages: "Power Outages",
    consumption: "Energy Consumption",
    documentation: "Documentation",
    hotelName: "Hotel name",
    address: "Address",
    region: "Country / Region",
    contact: "Contact person",
    phone: "Phone",
    email: "Email",
    rooms: "Number of rooms",
    floors: "Number of floors",
    area: "Total floor area",
    restaurants: "Number of restaurants",
    bars: "Number of bars",
    saunas: "Number of saunas",
    pools: "Number of swimming pools",
    elevators: "Number of elevators",
    gridVoltage: "Grid voltage",
    phases: "Phases (1 or 3)",
    mainConnection: "Main connection capacity",
    mainBreaker: "Main breaker rating",
    transformerPresent: "Transformer present",
    transformerCapacity: "Transformer capacity",
    generatorPresent: "Generator present",
    generatorCapacity: "Generator capacity",
    outagesPerMonth: "Average outages per month",
    avgOutageDuration: "Average duration of outage",
    longestOutage: "Longest outage last 3 years",
    outageMoment: "Outages occur mainly",
    outageSeason: "Season with most outages",
    annualConsumption: "Annual electricity consumption",
    avgDailyConsumption: "Average daily consumption",
    avgNightConsumption: "Average night consumption",
    maxPeakPower: "Maximum peak power",
    minBaseLoad: "Minimum base load",
    lineDiagram: "Electrical line diagram available",
    floorPlan: "Electrical schematic available",
    exportWord: "Generate Word report",
    exportExcel: "Generate Excel",
    yes: "Yes",
    no: "No",
    moments: ["morning","noon","afternoon","evening","night"],
    seasons: ["winter","summer","autumn","spring"],
    units: { volt: "V", kva: "kVA", amp: "A", kw: "kW", kwh: "kWh", area: "m²", min: "minutes" }
  },
  nl: {
    appTitle: "Hotel Energie Intake – Deel 1",
    general: "Algemene vragen",
    grid: "Netaansluiting",
    outages: "Stroomonderbrekingen",
    consumption: "Energieverbruik",
    documentation: "Documentatie",
    hotelName: "Hotelnaam",
    address: "Adres",
    region: "Land / Regio",
    contact: "Contactpersoon",
    phone: "Telefoon",
    email: "E-mail",
    rooms: "Aantal kamers",
    floors: "Aantal verdiepingen",
    area: "Totale vloeroppervlakte",
    restaurants: "Aantal restaurants",
    bars: "Aantal bars",
    saunas: "Aantal sauna's",
    pools: "Aantal zwembaden",
    elevators: "Aantal liften",
    gridVoltage: "Netspanning",
    phases: "Fasen (1 of 3)",
    mainConnection: "Hoofdaansluitvermogen",
    mainBreaker: "Hoofdzekering",
    transformerPresent: "Transformator aanwezig",
    transformerCapacity: "Transformatorvermogen",
    generatorPresent: "Generator aanwezig",
    generatorCapacity: "Generatorvermogen",
    outagesPerMonth: "Gemiddeld aantal onderbrekingen per maand",
    avgOutageDuration: "Gemiddelde duur van onderbreking",

    outageMoment: "Onderbrekingen gebeuren vooral",

    maxPeakPower: "Maximaal piekvermogen",
    minBaseLoad: "Minimale baseload",
    lineDiagram: "Elektrisch eendraadschema beschikbaar",
    floorPlan: "Elektrisch schema beschikbaar",
    exportWord: "Genereer Word rapport",

    yes: "Ja",
    no: "Nee",
    moments: ["ochtend","middag","namiddag","avond","nacht"],
    seasons: ["winter","zomer","herfst","lente"],
    units: { volt: "V", kva: "kVA", amp: "A", kw: "kW", kwh: "kWh", area: "m²", min: "minuten" }
  },
  fr: {
    appTitle: "Formulaire Énergie Hôtel – Partie 1",
    general: "Questions générales",
    grid: "Connexion réseau",
    outages: "Coupures de courant",
    consumption: "Consommation d'énergie",
    documentation: "Documentation",
    hotelName: "Nom de l'hôtel",
    address: "Adresse",
    region: "Pays / Région",
    contact: "Personne de contact",
    phone: "Téléphone",
    email: "E-mail",
    rooms: "Nombre de chambres",
    floors: "Nombre d'étages",
    area: "Surface totale",
    restaurants: "Nombre de restaurants",
    bars: "Nombre de bars",
    saunas: "Nombre de saunas",
    pools: "Nombre de piscines",
    elevators: "Nombre d'ascenseurs",
    gridVoltage: "Tension réseau",
    phases: "Phases (1 ou 3)",
    mainConnection: "Capacité de connexion principale",
    mainBreaker: "Disjoncteur principal",
    transformerPresent: "Transformateur présent",
    transformerCapacity: "Capacité transformateur",
    generatorPresent: "Générateur présent",
    generatorCapacity: "Capacité générateur",
    outagesPerMonth: "Coupures moyennes par mois",
    avgOutageDuration: "Durée moyenne d'une coupure",
    longestOutage: "Plus longue coupure sur 3 ans",
    outageMoment: "Les coupures se produisent surtout",
    outageSeason: "Saison avec le plus de coupures",
    annualConsumption: "Consommation annuelle d'électricité",
    avgDailyConsumption: "Consommation quotidienne moyenne",
    avgNightConsumption: "Consommation nocturne moyenne",
    maxPeakPower: "Puissance de pointe maximale",
    minBaseLoad: "Charge de base minimale",
    lineDiagram: "Schéma électrique disponible",
    floorPlan: "Plan électrique disponible",
    exportWord: "Générer rapport Word",
    exportExcel: "Générer Excel",
    yes: "Oui",
    no: "Non",
    moments: ["matin","midi","après-midi","soir","nuit"],
    seasons: ["hiver","été","automne","printemps"],
    units: { volt: "V", kva: "kVA", amp: "A", kw: "kW", kwh: "kWh", area: "m²", min: "minutes" }
  }
};

let lang = "en";
const state = {
  general: {},
  grid: { transformerPresent: "No", generatorPresent: "No" },
  outages: { outageMoment: "morning", outageSeason: "winter" },
  consumption: {},
  documentation: { lineDiagram: "No", floorPlan: "No" }
};

function currentText(){ return i18n[lang]; }

function setLanguage(newLang){
  lang = newLang;
  normalizeStateForLanguage();
  render();
}

function normalizeStateForLanguage(){
  const t = currentText();
  if(!t.moments.includes(state.outages.outageMoment)) state.outages.outageMoment = t.moments[0];
  if(!t.seasons.includes(state.outages.outageSeason)) state.outages.outageSeason = t.seasons[0];
  const yesNo = [t.yes, t.no];
  if(!yesNo.includes(state.grid.transformerPresent)) state.grid.transformerPresent = t.no;
  if(!yesNo.includes(state.grid.generatorPresent)) state.grid.generatorPresent = t.no;
  if(!yesNo.includes(state.documentation.lineDiagram)) state.documentation.lineDiagram = t.no;
  if(!yesNo.includes(state.documentation.floorPlan)) state.documentation.floorPlan = t.no;
}

function setField(section,key,value){
  state[section][key]=value;
}

function escapeHtml(str){
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fieldInput(section,key,label,unit="",type="text"){
  const value = state[section][key] ?? "";
  return `<div class="field">
    <label>${label}</label>
    <div class="unit-wrap">
      <input type="${type}" value="${escapeHtml(value)}" oninput="setField('${section}','${key}',this.value)" />
      ${unit ? `<div class="unit">${unit}</div>` : ``}
    </div>
  </div>`;
}

function fieldSelect(section,key,label,options){
  const value = state[section][key] ?? "";
  return `<div class="field">
    <label>${label}</label>
    <select onchange="setField('${section}','${key}',this.value)">
      ${options.map(o=>`<option value="${escapeHtml(o)}" ${value===o?'selected':''}>${o}</option>`).join("")}
    </select>
  </div>`;
}

function render(){
  const t = currentText();

  document.documentElement.lang = lang;
  document.title = t.appTitle;
  document.getElementById("appTitle").textContent = t.appTitle;
  document.getElementById("generalTitle").textContent = t.general;
  document.getElementById("gridTitle").textContent = t.grid;
  document.getElementById("outagesTitle").textContent = t.outages;
  document.getElementById("consumptionTitle").textContent = t.consumption;
  document.getElementById("documentationTitle").textContent = t.documentation;
  document.getElementById("wordBtn").textContent = t.exportWord;
  document.getElementById("excelBtn").textContent = t.exportExcel;

  document.querySelectorAll(".lang-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });

  document.getElementById("generalFields").innerHTML = [
    fieldInput("general","hotelName",t.hotelName),
    fieldInput("general","address",t.address),
    fieldInput("general","region",t.region),
    fieldInput("general","contact",t.contact),
    fieldInput("general","phone",t.phone),
    fieldInput("general","email",t.email),
    fieldInput("general","rooms",t.rooms),
    fieldInput("general","floors",t.floors),
    fieldInput("general","area",t.area,t.units.area),
    fieldInput("general","restaurants",t.restaurants),
    fieldInput("general","bars",t.bars),
    fieldInput("general","saunas",t.saunas),
    fieldInput("general","pools",t.pools),
    fieldInput("general","elevators",t.elevators)
  ].join("");

  document.getElementById("gridFields").innerHTML = [
    fieldInput("grid","gridVoltage",t.gridVoltage,t.units.volt),
    fieldInput("grid","phases",t.phases),
    fieldInput("grid","mainConnection",t.mainConnection,t.units.kva),
    fieldInput("grid","mainBreaker",t.mainBreaker,t.units.amp),
    fieldSelect("grid","transformerPresent",t.transformerPresent,[t.yes,t.no]),
    fieldInput("grid","transformerCapacity",t.transformerCapacity,t.units.kva),
    fieldSelect("grid","generatorPresent",t.generatorPresent,[t.yes,t.no]),
    fieldInput("grid","generatorCapacity",t.generatorCapacity,t.units.kva)
  ].join("");

  document.getElementById("outagesFields").innerHTML = [
    fieldInput("outages","outagesPerMonth",t.outagesPerMonth),
    fieldInput("outages","avgOutageDuration",t.avgOutageDuration,t.units.min,"number"),
    fieldInput("outages","longestOutage",t.longestOutage,t.units.min,"number"),
    fieldSelect("outages","outageMoment",t.outageMoment,t.moments),
    fieldSelect("outages","outageSeason",t.outageSeason,t.seasons)
  ].join("");

  document.getElementById("consumptionFields").innerHTML = [
    fieldInput("consumption","annualConsumption",t.annualConsumption,t.units.kwh),
    fieldInput("consumption","avgDailyConsumption",t.avgDailyConsumption,t.units.kwh),
    fieldInput("consumption","avgNightConsumption",t.avgNightConsumption,t.units.kwh),
    fieldInput("consumption","maxPeakPower",t.maxPeakPower,t.units.kw),
    fieldInput("consumption","minBaseLoad",t.minBaseLoad,t.units.kw)
  ].join("");

  document.getElementById("documentationFields").innerHTML = [
    fieldSelect("documentation","lineDiagram",t.lineDiagram,[t.yes,t.no]),
    fieldSelect("documentation","floorPlan",t.floorPlan,[t.yes,t.no])
  ].join("");
}

function makeRows(obj){
  return Object.entries(obj).map(([k,v])=>[k, v ?? ""]);
}

function exportExcel(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Field","Value"], ...makeRows(state.general)]), "General");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Field","Value"], ...makeRows(state.grid)]), "Grid");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Field","Value"], ...makeRows(state.outages)]), "Outages");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Field","Value"], ...makeRows(state.consumption)]), "Consumption");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Field","Value"], ...makeRows(state.documentation)]), "Documentation");
  XLSX.writeFile(wb, "hotel_energy_part1_multilang.xlsx");
}

async function exportWord(){
  const { Document, Packer, Paragraph, Table, TableRow, TableCell, HeadingLevel } = docx;
  const t = currentText();

  const makeTable = (obj) => new Table({
    rows: [
      new TableRow({
        children: [
          new TableCell({children:[new Paragraph("Field")]}),
          new TableCell({children:[new Paragraph("Value")]})
        ]
      }),
      ...Object.entries(obj).map(([k,v]) => new TableRow({
        children: [
          new TableCell({children:[new Paragraph(k)]}),
          new TableCell({children:[new Paragraph(String(v ?? ""))]})
        ]
      }))
    ]
  });

  const doc = new Document({
    sections:[{
      children:[
        new Paragraph({text:t.appTitle, heading:HeadingLevel.TITLE}),
        new Paragraph("Maker: Marco Bielen"),
        new Paragraph("Company: Bielen bv"),
        new Paragraph({text:t.general, heading:HeadingLevel.HEADING_1}),
        makeTable(state.general),
        new Paragraph({text:t.grid, heading:HeadingLevel.HEADING_1}),
        makeTable(state.grid),
        new Paragraph({text:t.outages, heading:HeadingLevel.HEADING_1}),
        makeTable(state.outages),
        new Paragraph({text:t.consumption, heading:HeadingLevel.HEADING_1}),
        makeTable(state.consumption),
        new Paragraph({text:t.documentation, heading:HeadingLevel.HEADING_1}),
        makeTable(state.documentation)
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hotel_energy_part1_multilang.docx";
  a.click();
  URL.revokeObjectURL(url);
}

document.querySelectorAll(".lang-btn").forEach(btn=>{
  btn.addEventListener("click",()=>setLanguage(btn.dataset.lang));
});

normalizeStateForLanguage();
render();
</script>
</body>
</html>
